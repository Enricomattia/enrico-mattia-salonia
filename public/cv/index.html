<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enrico Mattia Salonia — Curriculum Vitae</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; background: #FAFAF8; font-family: 'IBM Plex Mono', monospace; }
  .bar {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 12px clamp(16px, 4vw, 32px);
    border-bottom: 1px solid #E7E9EC; background: rgba(250,250,248,0.94);
    backdrop-filter: blur(8px); flex: 0 0 auto;
  }
  .bar a, .bar button {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase; color: #7b8590; text-decoration: none;
    background: none; border: none; cursor: pointer; padding: 0;
  }
  .bar .title { color: #14202a; letter-spacing: 0.04em; text-transform: none; font-size: 13px; }
  .dl {
    color: #FAFAF8 !important; background: #1f5673; border-radius: 4px;
    padding: 8px 16px; display: inline-flex; align-items: center; gap: 8px;
  }
  .dl:hover { background: #17455d; }
  .back:hover { color: #1f5673; }
  iframe { flex: 1 1 auto; width: 100%; border: none; background: #fff; }
</style>
</head>
<body>
  <div class="bar">
    <a class="back" href="/">← Back</a>
    <span class="title">Curriculum Vitae — Enrico Mattia Salonia</span>
    <button class="dl" onclick="printCv()">↓ Download PDF</button>
  </div>
  <iframe id="cv" src="cv.html" title="Curriculum Vitae"></iframe>
  <script>
    function printCv() {
      var f = document.getElementById('cv');
      try {
        f.contentWindow.focus();
        f.contentWindow.print();
      } catch (e) {
        window.open('cv.html', '_blank');
      }
    }
  </script>
</body>
</html>
